<!DOCTYPE html>
<html class="dark" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aura Edit - エディター</title>
<!-- QWebChannel Injection -->
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-surface-variant": "#e4beba",
                      "tertiary": "#e8c353",
                      "surface-tint": "#ffb3ae",
                      "surface-container": "rgba(32,32,31, 0.8)", /* Made slightly transparent */
                      "on-primary-fixed-variant": "#930014",
                      "tertiary-fixed-dim": "#e7c353",
                      "primary-container": "#ff5352",
                      "secondary-fixed": "#d7e3ff",
                      "surface": "transparent", /* Important for overlay */
                      "on-error-container": "#ffdad6",
                      "on-primary-container": "#5c0008",
                      "error": "#ffb4ab",
                      "secondary-container": "#0068d1",
                      "on-tertiary-fixed": "#241a00",
                      "error-container": "#93000a",
                      "on-tertiary-fixed-variant": "#574500",
                      "tertiary-container": "#caa83a",
                      "inverse-primary": "#ba1724",
                      "primary-fixed": "#ffdad7",
                      "surface-container-lowest": "rgba(14,14,14, 0.6)",
                      "secondary-fixed-dim": "#abc7ff",
                      "surface-container-high": "#2a2a2a",
                      "outline-variant": "#5b403e",
                      "primary": "#ffb3ae",
                      "on-secondary-fixed": "#001b3f",
                      "on-tertiary": "#3c2f00",
                      "on-error": "#690005",
                      "on-surface": "#e5e2e1",
                      "inverse-surface": "#e5e2e1",
                      "surface-bright": "#393939",
                      "surface-dim": "rgba(19,19,19,0.8)",
                      "on-background": "#e5e2e1",
                      "outline": "#ab8986",
                      "primary-fixed-dim": "#ffb3ae",
                      "surface-container-low": "rgba(28,27,27, 0.8)",
                      "on-primary": "#68000b",
                      "surface-container-highest": "#353535",
                      "on-tertiary-container": "#4f3e00",
                      "secondary": "#abc7ff",
                      "on-secondary-container": "#e5ecff",
                      "on-primary-fixed": "#410004",
                      "surface-variant": "#353535",
                      "inverse-on-surface": "#313030",
                      "on-secondary-fixed-variant": "#00458e",
                      "on-secondary": "#002f65",

<style>
        /* Transparent body and main */
        body { background: transparent !important; }

        /* Custom styles for the 3DS/Squishy aesthetic that Tailwind alone can't fully express easily */
        .squishy-button {
            box-shadow: 0 4px 0 0 rgba(0,0,0,0.4), 0 8px 12px rgba(0,0,0,0.3);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .squishy-button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 0 rgba(0,0,0,0.4), 0 2px 4px rgba(0,0,0,0.2);
        }

        .chunky-panel {
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.05), inset 0 -2px 4px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .slider-track {
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), inset 0 -1px 2px rgba(255,255,255,0.1);
        }

        .slider-thumb {
            box-shadow: 0 4px 0 0 rgba(147, 0, 10, 1), 0 4px 8px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        .slider-thumb:active {
            transform: scale(1.1) translateY(2px);
            box-shadow: 0 2px 0 0 rgba(147, 0, 10, 1), 0 2px 4px rgba(0,0,0,0.5);
        }

        .toggle-track {
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
        }
        .toggle-knob {
            box-shadow: 0 2px 0 0 rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.2);
        }

        /* Subtle dot grid for toolboxes */
        .dot-grid {
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 12px 12px;
        }

        /* Interactive range input overlaid on custom UI */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            position: absolute;
            height: 100%;
            opacity: 0;
            z-index: 50;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-background text-on-surface h-screen w-screen overflow-hidden flex flex-col font-body-md select-none pointer-events-none">
<!-- Pointer events none on body allows clicking through to OpenGL canvas behind -->

<!-- TopNavBar (Web) -->
<header class="hidden md:flex justify-between items-center w-full px-margin h-20 bg-surface-container border-b-4 border-surface-container-highest shadow-[0_4px_0_0_rgba(0,0,0,0.25)] z-50 rounded-b-xl relative pointer-events-auto">
<div class="flex items-center gap-md">
<h1 class="font-display-lg text-display-lg text-primary italic">Aura Edit</h1>
</div>
<div class="flex items-center gap-sm">
<button class="w-10 h-10 rounded-full bg-surface-container-high hover:scale-105 active:scale-95 transition-transform flex items-center justify-center squishy-button">
<span class="material-symbols-outlined text-on-surface">minimize</span>
</button>
<button class="w-10 h-10 rounded-full bg-surface-container-high hover:scale-105 active:scale-95 transition-transform flex items-center justify-center squishy-button">
<span class="material-symbols-outlined text-on-surface">fullscreen</span>
</button>
<button class="w-10 h-10 rounded-full bg-error-container hover:scale-105 active:scale-95 transition-transform flex items-center justify-center squishy-button">
<span class="material-symbols-outlined text-on-error-container">close</span>
</button>
</div>
</header>
<div class="flex flex-1 overflow-hidden relative">
<!-- SideNavBar (Web) -->
<nav class="hidden md:flex flex-col items-center py-lg gap-lg h-full w-24 bg-surface-container-low border-r-4 border-surface-container-highest shadow-[4px_0_0_0_rgba(0,0,0,0.2)] rounded-r-xl z-40 relative pointer-events-auto">
<button class="text-on-surface-variant flex flex-col items-center justify-center p-md hover:bg-surface-container-high hover:scale-105 transition-all duration-300 active:scale-95 active:translate-y-1 rounded-xl w-20">
<span class="material-symbols-outlined text-headline-lg mb-xs" style="font-variation-settings: 'FILL' 0;">photo_camera</span>
<span class="font-label-sm text-label-sm">Camera</span>
</button>
<!-- Active Tab -->
<button class="bg-secondary-container text-on-secondary-container rounded-xl shadow-[0_4px_0_0_#00458e] scale-110 flex flex-col items-center justify-center p-md active:scale-95 active:translate-y-1 transition-all w-20">
<span class="material-symbols-outlined text-headline-lg mb-xs" style="font-variation-settings: 'FILL' 1;">brush</span>
<span class="font-label-sm text-label-sm font-bold">Editor</span>
</button>
<button class="text-on-surface-variant flex flex-col items-center justify-center p-md hover:bg-surface-container-high hover:scale-105 transition-all duration-300 active:scale-95 active:translate-y-1 rounded-xl w-20">
<span class="material-symbols-outlined text-headline-lg mb-xs" style="font-variation-settings: 'FILL' 0;">photo_library</span>
<span class="font-label-sm text-label-sm">Gallery</span>
</button>
</nav>

<!-- Main Canvas Area -->
<main class="flex-1 flex flex-col md:flex-row p-md md:p-margin gap-margin overflow-y-auto overflow-x-hidden bg-surface relative">

<!-- Central Photo Preview (Made invisible so we see C++ OpenGL canvas) -->
<div class="flex-1 flex flex-col items-center justify-center relative min-h-[500px]">
    <!-- Intentionally left blank, Qt OpenGL draws here -->
</div>

<!-- Right Sidebar: Editing Controls -->
<aside class="w-full md:w-80 flex-shrink-0 flex flex-col gap-md pointer-events-auto">
<!-- Toolbox Container -->
<div class="bg-surface-container rounded-xl chunky-panel p-md dot-grid flex flex-col gap-lg h-full overflow-y-auto">
<div class="flex items-center justify-between border-b-2 border-surface-container-highest pb-sm">
<h2 class="font-headline-md text-headline-md text-on-surface">レタッチツール</h2>
<button class="w-8 h-8 rounded-full bg-surface-container-high hover:bg-surface-container-highest flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</button>
</div>

<!-- Slider: Skin Smoothness -->
<div class="flex flex-col gap-sm">
<div class="flex justify-between items-center">
<label class="font-label-lg text-label-lg text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">face</span>
肌のなめらかさ
</label>
<span id="skinLabel" class="font-label-sm text-label-sm text-tertiary">75%</span>
</div>
<div class="relative h-12 flex items-center group">
    <input type="range" min="0" max="100" value="75" id="sliderSkin">
    <div class="absolute w-full h-4 bg-surface-container-lowest rounded-full slider-track"></div>
    <div id="skinFill" class="absolute h-4 bg-tertiary rounded-l-full pointer-events-none" style="width: 75%;"></div>
    <div id="skinThumb" class="absolute w-8 h-8 bg-tertiary rounded-full slider-thumb flex items-center justify-center group-active:scale-110 transition-transform pointer-events-none" style="left: calc(75% - 16px);">
        <div class="w-3 h-3 bg-white rounded-full opacity-50"></div>
    </div>
</div>
</div>

<!-- Slider: Face Shape -->
<div class="flex flex-col gap-sm">
<div class="flex justify-between items-center">
<label class="font-label-lg text-label-lg text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">transform</span>
輪郭の調整
</label>
<span id="shapeLabel" class="font-label-sm text-label-sm text-secondary">0%</span>
</div>
<div class="relative h-12 flex items-center group">
    <input type="range" min="-50" max="50" value="0" id="sliderShape">
    <div class="absolute w-full h-4 bg-surface-container-lowest rounded-full slider-track"></div>
    <div class="absolute w-1 h-6 bg-surface-container-highest left-1/2 -translate-x-1/2 rounded-full z-10"></div>
    <div id="shapeThumb" class="absolute w-8 h-8 bg-secondary rounded-full slider-thumb flex items-center justify-center z-20 group-active:scale-110 transition-transform pointer-events-none" style="left: calc(50% - 16px);">
        <div class="w-3 h-3 bg-white rounded-full opacity-50"></div>
    </div>
</div>
</div>

<!-- Slider: Eye Size -->
<div class="flex flex-col gap-sm">
<div class="flex justify-between items-center">
<label class="font-label-lg text-label-lg text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">visibility</span>
目の大きさ
</label>
<span id="eyeLabel" class="font-label-sm text-label-sm text-primary-container">0%</span>
</div>
<div class="relative h-12 flex items-center group">
    <input type="range" min="-50" max="50" value="0" id="sliderEye">
    <div class="absolute w-full h-4 bg-surface-container-lowest rounded-full slider-track"></div>
    <div id="eyeFill" class="absolute h-4 bg-primary-container rounded-l-full pointer-events-none" style="width: 50%;"></div>
    <div id="eyeThumb" class="absolute w-8 h-8 bg-primary-container rounded-full slider-thumb flex items-center justify-center group-active:scale-110 transition-transform pointer-events-none" style="left: calc(50% - 16px);">
        <div class="w-3 h-3 bg-white rounded-full opacity-50"></div>
    </div>
</div>
</div>

</div>
</aside>
</main>
</div>

<script>
    // Visual Updates
    function updateSliderVisuals(id, fillId, thumbId, labelId, isCenterBased) {
        const input = document.getElementById(id);
        const fill = document.getElementById(fillId);
        const thumb = document.getElementById(thumbId);
        const label = document.getElementById(labelId);

        input.addEventListener('input', (e) => {
            const val = e.target.value;
            const min = parseInt(e.target.min);
            const max = parseInt(e.target.max);
            const percent = ((val - min) / (max - min)) * 100;

            if (label) label.innerText = val + "%";
            if (thumb) thumb.style.left = `calc(${percent}% - 16px)`;

            if (fill) {
                if (isCenterBased) {
                     // Advanced fill logic for center based sliders if needed
                } else {
                    fill.style.width = `${percent}%`;
                }
            }
        });
    }

    updateSliderVisuals('sliderSkin', 'skinFill', 'skinThumb', 'skinLabel', false);
    updateSliderVisuals('sliderShape', null, 'shapeThumb', 'shapeLabel', true);
    updateSliderVisuals('sliderEye', 'eyeFill', 'eyeThumb', 'eyeLabel', true);

    // QWebChannel Integration
    var backend = null;
    new QWebChannel(qt.webChannelTransport, function(channel) {
        backend = channel.objects.appController;
        backend.logMessage("UI connected to C++ successfully!");

        document.getElementById('sliderSkin').addEventListener('input', (e) => {
            backend.onSkinSmoothnessChanged(parseInt(e.target.value));
        });

        document.getElementById('sliderShape').addEventListener('input', (e) => {
            // Slider goes -50 to 50, backend might expect 0-100 or signed. Let's pass as is.
            backend.onFaceShapeChanged(parseInt(e.target.value));
        });

        document.getElementById('sliderEye').addEventListener('input', (e) => {
            backend.onEyeSizeChanged(parseInt(e.target.value));
        });
    });
</script>
</body></html>
